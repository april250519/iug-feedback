<!-- IUG Feedback: Entry + Single Reusable Modal -->
<div class="iug-feedback-bar" aria-label="IUG feedback">
  <button class="iug-feedback-emoji" type="button" aria-label="Satisfied" data-feedback="satisfied">
    <img class="iug-emoji-img" src="./rate-satisfied.png" alt="Satisfied" />
  </button>

  <button class="iug-feedback-emoji" type="button" aria-label="Neutral" data-feedback="neutral">
    <img class="iug-emoji-img" src="./rate-neutral.png" alt="Neutral" />
  </button>

  <button class="iug-feedback-emoji" type="button" aria-label="Unsatisfied" data-feedback="unsatisfied">
    <img class="iug-emoji-img" src="./rate-unsatisfied.png" alt="Unsatisfied" />
  </button>
</div>

<div class="iug-feedback-modal" id="iugFeedbackModal" aria-hidden="true">
  <div class="iug-feedback-overlay" data-close-modal></div>

  <div class="iug-feedback-card" role="dialog" aria-modal="true" aria-labelledby="iugFeedbackTitle">
    <button class="iug-feedback-close" type="button" aria-label="Close" data-close-modal>
      ×
    </button>

    <div class="iug-feedback-icon">
      <img id="iugFeedbackIcon" class="iug-modal-emoji-img" src="./rate-satisfied.png" alt="" />
    </div>

    <h2 id="iugFeedbackTitle" class="iug-feedback-title">
      Thanks for your feedback!
    </h2>

    <p id="iugFeedbackSubtitle" class="iug-feedback-subtitle">
      Both fields are optional.
    </p>

    <textarea
      id="iugFeedbackComment"
      class="iug-feedback-textarea"
      placeholder="Any comments or suggestions?"
    ></textarea>

    <input
      id="iugFeedbackContact"
      class="iug-feedback-input"
      type="text"
      placeholder="Your Email"
    />

    <p id="iugFeedbackContactNote" class="iug-feedback-contact-note" hidden>
      So we can help you within 24h.
    </p>

    <p class="iug-feedback-note">
      Every comment is read by our team and helps us improve.
    </p>

    <button id="iugFeedbackDone" class="iug-feedback-done" type="button">
      Done
    </button>
  </div>
</div>

<style>
  .iug-feedback-bar {
    position: fixed;
    left: 50%;
    bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    transform: translateX(-50%);
    z-index: 9998;

    display: flex;
    align-items: center;
    justify-content: space-between;

    width: min(84vw, 360px);
    pointer-events: none;
  }

  .iug-feedback-emoji {
    pointer-events: auto;
    width: 96px;
    height: 96px;
    border: none;
    border-radius: 50%;
    background: transparent;
    padding: 0;

    display: flex;
    align-items: center;
    justify-content: center;

    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s ease, filter 0.15s ease;
  }

  .iug-feedback-emoji:active {
    transform: scale(0.94);
  }

  .iug-feedback-emoji.is-selected {
    transform: scale(1.06);
    filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.28));
  }

  .iug-emoji-img {
    display: block;
    width: 84px;
    height: 84px;
    object-fit: contain;
  }

  .iug-feedback-modal {
    position: fixed;
    inset: 0;
    z-index: 10000;

    display: none;
    align-items: center;
    justify-content: center;

    padding: 20px;
    box-sizing: border-box;
  }

  .iug-feedback-modal.is-open {
    display: flex;
  }

  .iug-feedback-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.58);
    backdrop-filter: blur(2px);
  }

  .iug-feedback-card {
    position: relative;
    z-index: 1;

    width: 80vw;
    max-width: 430px;
    min-height: 70vh;
    max-height: 70vh;
    overflow-y: auto;

    background: #fff;
    border-radius: 24px;
    padding: 34px 28px 28px;

    box-shadow: 0 22px 56px rgba(0, 0, 0, 0.32);

    display: flex;
    flex-direction: column;
    align-items: center;

    box-sizing: border-box;
    font-family: inherit;
    color: #111;
  }

  .iug-feedback-close {
    position: absolute;
    top: 14px;
    right: 16px;

    width: 34px;
    height: 34px;

    border: none;
    background: transparent;
    color: #777;

    font-size: 28px;
    line-height: 1;
    cursor: pointer;
  }

  .iug-feedback-icon {
    width: 78px;
    height: 78px;
    margin-bottom: 22px;

    display: flex;
    align-items: center;
    justify-content: center;
  }

  .iug-modal-emoji-img {
    display: block;
    width: 78px;
    height: 78px;
    object-fit: contain;
  }

  .iug-feedback-title {
    margin: 0;
    font-size: 24px;
    line-height: 1.25;
    font-weight: 800;
    text-align: center;
    color: #111;
  }

  .iug-feedback-subtitle {
    width: 100%;
    margin: 18px 0 18px;
    font-size: 16px;
    line-height: 1.35;
    font-style: italic;
    color: #777;
    text-align: left;
  }

  .iug-feedback-textarea {
    width: 100%;
    height: 160px;
    resize: none;

    border: 1.5px solid var(--iug-feedback-color, #46ad52);
    border-radius: 18px;
    background: #fff;

    padding: 18px;

    font-family: inherit;
    font-size: 18px;
    line-height: 1.4;
    color: #111;

    outline: none;
    box-sizing: border-box;
  }

  .iug-feedback-input {
    width: 100%;
    height: 66px;
    margin-top: 24px;

    border: 1px solid #d8d8d8;
    border-radius: 18px;
    background: #fff;

    padding: 0 18px;

    font-family: inherit;
    font-size: 18px;
    color: #111;

    outline: none;
    box-sizing: border-box;
  }

  .iug-feedback-textarea::placeholder,
  .iug-feedback-input::placeholder {
    color: #777;
    opacity: 1;
  }

  .iug-feedback-textarea:focus,
  .iug-feedback-input:focus {
    border-color: var(--iug-feedback-color, #46ad52);
  }

  .iug-feedback-contact-note {
    width: 100%;
    margin: 10px 0 0;
    font-size: 14px;
    line-height: 1.35;
    font-style: italic;
    color: #777;
    text-align: left;
  }

  .iug-feedback-note {
    width: 100%;
    margin: 34px 0 28px;
    font-size: 16px;
    line-height: 1.45;
    color: #666;
    text-align: center;
  }

  .iug-feedback-done {
    width: 100%;
    height: 66px;

    margin-top: auto;

    border: none;
    border-radius: 999px;
    background: #111;
    color: #fff;

    font-family: inherit;
    font-size: 20px;
    font-weight: 800;

    cursor: pointer;
  }

  .iug-feedback-done:active {
    transform: scale(0.98);
  }

  .iug-feedback-done.is-loading {
    opacity: 0.7;
    pointer-events: none;
  }

  .iug-feedback-toast {
    position: fixed;
    left: 50%;
    bottom: calc(150px + env(safe-area-inset-bottom, 0px));
    transform: translateX(-50%) translateY(8px);
    z-index: 10001;

    max-width: min(86vw, 380px);

    background: #111;
    color: #fff;

    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;

    padding: 12px 18px;
    border-radius: 999px;

    opacity: 0;
    pointer-events: none;

    transition: opacity 0.18s ease, transform 0.18s ease;
  }

  .iug-feedback-toast.is-visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 390px) {
    .iug-feedback-bar {
      width: 86vw;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    }

    .iug-feedback-emoji {
      width: 82px;
      height: 82px;
    }

    .iug-emoji-img {
      width: 72px;
      height: 72px;
    }

    .iug-feedback-card {
      width: 82vw;
      min-height: 70vh;
      max-height: 70vh;
      padding: 28px 22px 24px;
      border-radius: 22px;
    }

    .iug-feedback-icon {
      width: 68px;
      height: 68px;
      margin-bottom: 18px;
    }

    .iug-modal-emoji-img {
      width: 68px;
      height: 68px;
    }

    .iug-feedback-title {
      font-size: 21px;
    }

    .iug-feedback-subtitle {
      font-size: 14px;
    }

    .iug-feedback-textarea {
      height: 138px;
      font-size: 15px;
    }

    .iug-feedback-input {
      height: 56px;
      font-size: 15px;
    }

    .iug-feedback-note {
      font-size: 14px;
    }

    .iug-feedback-done {
      height: 56px;
      font-size: 18px;
    }
  }
</style>

<script>
  const FORMSPREE_ENDPOINT = "https://formspree.io/f/YOUR_FORM_ID";

  const IUG_FEEDBACK_CONTENT = {
    satisfied: {
      icon: "./rate-satisfied.png",
      alt: "Satisfied",
      title: "Thanks for your feedback!",
      subtitle: "Both fields are optional.",
      commentPlaceholder: "Any comments or suggestions?",
      contactPlaceholder: "Your Email",
      color: "#46ad52",
      showContactNote: false,
    },
    neutral: {
      icon: "./rate-neutral.png",
      alt: "Neutral",
      title: "Thanks for your feedback!",
      subtitle: "Both fields are optional.",
      commentPlaceholder: "Any comments or suggestions?",
      contactPlaceholder: "Your Email",
      color: "#f3c433",
      showContactNote: false,
    },
    unsatisfied: {
      icon: "./rate-unsatisfied.png",
      alt: "Unsatisfied",
      title: "Sorry this wasn't helpful.",
      subtitle: "Both fields are optional.",
      commentPlaceholder: "Tell us what happened",
      contactPlaceholder: "Your Email or Phone Number",
      color: "#df4747",
      showContactNote: true,
    },
  };

  let selectedIugFeedback = null;

  const modal = document.getElementById("iugFeedbackModal");
  const card = modal.querySelector(".iug-feedback-card");
  const icon = document.getElementById("iugFeedbackIcon");
  const title = document.getElementById("iugFeedbackTitle");
  const subtitle = document.getElementById("iugFeedbackSubtitle");
  const comment = document.getElementById("iugFeedbackComment");
  const contact = document.getElementById("iugFeedbackContact");
  const contactNote = document.getElementById("iugFeedbackContactNote");
  const doneButton = document.getElementById("iugFeedbackDone");

  document.querySelectorAll(".iug-feedback-emoji").forEach((button) => {
    button.addEventListener("click", () => {
      const feedbackType = button.dataset.feedback;

      selectedIugFeedback = feedbackType;

      document.querySelectorAll(".iug-feedback-emoji").forEach((btn) => {
        btn.classList.remove("is-selected");
      });

      button.classList.add("is-selected");
      openIugFeedbackModal(feedbackType);
    });
  });

  document.querySelectorAll("[data-close-modal]").forEach((element) => {
    element.addEventListener("click", closeIugFeedbackModal);
  });

  doneButton.addEventListener("click", async () => {
    await handleIugFeedbackSubmit();
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
      closeIugFeedbackModal();
    }
  });

  function openIugFeedbackModal(type) {
    const config = IUG_FEEDBACK_CONTENT[type];

    if (!config) {
      console.error("IUG feedback type not found:", type);
      return;
    }

    icon.src = config.icon;
    icon.alt = config.alt;
    title.textContent = config.title;
    subtitle.textContent = config.subtitle;
    comment.placeholder = config.commentPlaceholder;
    contact.placeholder = config.contactPlaceholder;
    contactNote.hidden = !config.showContactNote;

    card.style.setProperty("--iug-feedback-color", config.color);

    modal.classList.add("is-open");
    modal.setAttribute("aria-hidden", "false");

    setTimeout(() => {
      comment.focus();
    }, 120);
  }

  function closeIugFeedbackModal() {
    modal.classList.remove("is-open");
    modal.setAttribute("aria-hidden", "true");
  }

  async function handleIugFeedbackSubmit() {
    if (!selectedIugFeedback) return;

    const feedbackComment = comment.value.trim();
    const feedbackContact = contact.value.trim();

    doneButton.classList.add("is-loading");
    doneButton.textContent = "Saving...";

    const success = await submitIugFeedback({
      rating: selectedIugFeedback,
      comment: feedbackComment,
      contact: feedbackContact,
    });

    doneButton.classList.remove("is-loading");
    doneButton.textContent = "Done";

    if (success) {
      closeIugFeedbackModal();

      comment.value = "";
      contact.value = "";

      showIugFeedbackToast("Thanks — your feedback was saved.");
    } else {
      showIugFeedbackToast("Feedback could not be saved. Please try again.");
    }
  }

  async function submitIugFeedback({ rating, comment = "", contact = "" }) {
    if (FORMSPREE_ENDPOINT.includes("YOUR_FORM_ID")) {
      console.warn("Please replace FORMSPREE_ENDPOINT with your real Formspree endpoint.");
      return true;
    }

    try {
      const response = await fetch(FORMSPREE_ENDPOINT, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Accept: "application/json",
        },
        body: JSON.stringify({
          rating,
          comment,
          contact,
          page_url: window.location.href,
          page_title: document.title,
          user_agent: navigator.userAgent,
          submitted_at: new Date().toISOString(),
        }),
      });

      return response.ok;
    } catch (error) {
      console.error("IUG feedback submit failed:", error);
      return false;
    }
  }

  function showIugFeedbackToast(message) {
    const existingToast = document.querySelector(".iug-feedback-toast");

    if (existingToast) {
      existingToast.remove();
    }

    const toast = document.createElement("div");
    toast.className = "iug-feedback-toast";
    toast.textContent = message;

    document.body.appendChild(toast);

    setTimeout(() => {
      toast.classList.add("is-visible");
    }, 10);

    setTimeout(() => {
      toast.classList.remove("is-visible");

      setTimeout(() => {
        toast.remove();
      }, 200);
    }, 2200);
  }
</script>
