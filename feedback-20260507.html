<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<div class="iug-feedback-entry" id="iugFeedbackEntry" aria-label="IUG feedback">
  <div class="iug-feedback-bar">
    <button class="iug-feedback-emoji" type="button" aria-label="Satisfied" data-feedback="satisfied">
      <img class="iug-emoji-img" src="./rate-satisfied.png" alt="Satisfied" />
    </button>

    <button class="iug-feedback-emoji" type="button" aria-label="Neutral" data-feedback="neutral">
      <img class="iug-emoji-img" src="./rate-neutral.png" alt="Neutral" />
    </button>

    <button class="iug-feedback-emoji" type="button" aria-label="Unsatisfied" data-feedback="unsatisfied">
      <img class="iug-emoji-img" src="./rate-unsatisfied.png" alt="Unsatisfied" />
    </button>
  </div>

  <button
    class="iug-feedback-entry-close"
    id="iugFeedbackEntryClose"
    type="button"
    aria-label="Hide feedback entry for 30 seconds"
  >
    ×
  </button>
</div>

<div class="iug-feedback-modal" id="iugFeedbackModal" aria-hidden="true">
  <div class="iug-feedback-overlay"></div>

  <div class="iug-feedback-card" role="dialog" aria-modal="true" aria-labelledby="iugFeedbackTitle">
    <div class="iug-feedback-top">
      <img id="iugFeedbackIcon" class="iug-modal-emoji-img" src="./rate-satisfied.png" alt="Satisfied" />
      <h2 id="iugFeedbackTitle" class="iug-feedback-title">Thanks for your feedback!</h2>
      <p class="iug-feedback-optional">Both fields are optional.</p>
    </div>

    <div class="iug-feedback-middle">
      <textarea id="iugFeedbackComment" class="iug-feedback-textarea" placeholder="Any comments or suggestions?"></textarea>
      <input id="iugFeedbackContact" class="iug-feedback-input" type="text" placeholder="Your Email" />
      <p id="iugFeedbackContactNote" class="iug-feedback-contact-note" hidden>
        So we can help you within 24h.
      </p>
    </div>

    <div class="iug-feedback-bottom">
      <p id="iugFeedbackNote" class="iug-feedback-note">
        Every comment is read by our team and helps us improve.
      </p>
      <button id="iugFeedbackDone" class="iug-feedback-done" type="button">Done</button>
    </div>
  </div>
</div>

<div id="iugFeedbackToast" class="iug-feedback-toast" role="status" aria-live="polite"></div>

<style>
.iug-feedback-entry,
.iug-feedback-entry *,
.iug-feedback-modal,
.iug-feedback-modal *,
.iug-feedback-toast {
  box-sizing: border-box;
}

.iug-feedback-entry {
  position: fixed;
  left: 50%;
  bottom: calc(16px + env(safe-area-inset-bottom, 0px));
  z-index: 10002;
  width: 82vw;
  max-width: 360px;
  transform: translateX(-50%);
  opacity: 1;
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
}

.iug-feedback-entry.is-hidden {
  opacity: 0;
  transform: translateX(-50%) translateY(10px);
  pointer-events: none;
}

.iug-feedback-bar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.iug-feedback-entry-close {
  position: absolute;
  top: -4px;
  right: 10px;
  z-index: 2;
  width: 22px;
  height: 22px;
  padding: 0;
  border: 1px solid rgba(120, 120, 120, 0.35);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.88);
  color: #777;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 16px;
  line-height: 19px;
  font-weight: 500;
  text-align: center;
  cursor: pointer;
  pointer-events: auto;
  appearance: none;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
}

.iug-feedback-entry-close:active {
  transform: scale(0.92);
}

.iug-feedback-emoji {
  pointer-events: auto;
  width: 68px;
  height: 68px;
  padding: 0;
  border: 0;
  border-radius: 50%;
  background: transparent;
  cursor: pointer;
  appearance: none;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}

.iug-feedback-emoji:active {
  transform: scale(0.94);
}

.iug-feedback-emoji.is-selected {
  transform: scale(1.08);
  filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.3));
}

.iug-emoji-img {
  display: block;
  width: 54px;
  height: 54px;
  object-fit: contain;
}

.iug-feedback-modal {
  position: fixed;
  inset: 0;
  z-index: 10000;
  display: none;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.iug-feedback-modal.is-open {
  display: flex;
}

.iug-feedback-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.64);
  backdrop-filter: blur(2px);
  pointer-events: none;
}

.iug-feedback-card {
  position: relative;
  z-index: 1;
  width: 88vw;
  height: 70vh;
  height: 70dvh;
  max-width: 520px;
  min-height: 0;
  padding: 28px 24px 18px;
  border-radius: 22px;
  background: #fff;
  color: #111;
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
  pointer-events: auto;
  overflow: hidden;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  display: flex;
  flex-direction: column;
}

.iug-feedback-top {
  flex: 0 0 auto;
  text-align: center;
}

.iug-modal-emoji-img {
  display: block;
  width: 46px;
  height: 46px;
  margin: 0 auto 18px;
  object-fit: contain;
}

.iug-feedback-title {
  margin: 0 0 14px;
  color: #111;
  font-size: 19px;
  line-height: 1.2;
  font-weight: 800;
  text-align: center;
}

.iug-feedback-optional {
  margin: 0;
  color: #888;
  font-size: 11px;
  line-height: 1.4;
  font-style: italic;
  font-weight: 500;
  text-align: left;
}

.iug-feedback-middle {
  flex: 0 0 auto;
  width: 100%;
  margin-top: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.iug-feedback-textarea,
.iug-feedback-input {
  width: 100%;
  border-radius: 14px;
  background: #fff;
  color: #111;
  font-family: inherit;
  font-weight: 500;
  outline: none;
  appearance: none;
}

.iug-feedback-textarea {
  height: 126px;
  resize: none;
  padding: 13px;
  border: 1.5px solid var(--iug-feedback-color, #46ad52);
  font-size: 12px;
  line-height: 1.45;
}

.iug-feedback-input {
  height: 40px;
  padding: 0 13px;
  border: 1.5px solid #ddd;
  font-size: 12px;
}

.iug-feedback-textarea::placeholder,
.iug-feedback-input::placeholder {
  color: #777;
  opacity: 1;
}

.iug-feedback-textarea:focus,
.iug-feedback-input:focus {
  border-color: var(--iug-feedback-color, #46ad52);
}

.iug-feedback-contact-note {
  margin: -6px 0 0;
  color: #888;
  font-size: 10px;
  line-height: 1.4;
  font-style: italic;
  font-weight: 500;
  text-align: left;
}

.iug-feedback-bottom {
  flex: 0 0 auto;
  width: 100%;
  margin-top: auto;
  padding-top: 18px;
}

.iug-feedback-note {
  max-width: 86%;
  margin: 0 auto 14px;
  color: #666;
  font-size: 10px;
  line-height: 1.45;
  font-weight: 500;
  text-align: center;
}

.iug-feedback-note.is-left {
  max-width: none;
  text-align: left;
}

.iug-feedback-done {
  width: 100%;
  height: 42px;
  padding: 0;
  border: 0;
  border-radius: 999px;
  background: #111;
  color: #fff;
  font-family: inherit;
  font-size: 14px;
  line-height: 1;
  font-weight: 800;
  cursor: pointer;
}

.iug-feedback-done:active {
  transform: scale(0.98);
}

.iug-feedback-done.is-loading {
  opacity: 0.7;
  pointer-events: none;
}

.iug-feedback-toast {
  position: fixed;
  left: 50%;
  bottom: calc(116px + env(safe-area-inset-bottom, 0px));
  z-index: 10003;
  max-width: 82vw;
  padding: 12px 18px;
  border-radius: 999px;
  background: #111;
  color: #fff;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 14px;
  font-weight: 700;
  opacity: 0;
  pointer-events: none;
  transform: translateX(-50%) translateY(8px);
  transition: opacity 0.18s ease, transform 0.18s ease;
}

.iug-feedback-toast.is-visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@media (max-width: 430px) {
  .iug-feedback-card {
    width: 88vw;
    height: 70vh;
    height: 70dvh;
    max-width: none;
    padding: 28px 18px 18px;
  }

  .iug-modal-emoji-img {
    width: 44px;
    height: 44px;
    margin-bottom: 16px;
  }

  .iug-feedback-title {
    margin-bottom: 13px;
    font-size: 17px;
  }

  .iug-feedback-middle {
    margin-top: 16px;
    gap: 13px;
  }

  .iug-feedback-textarea {
    height: 126px;
    padding: 12px;
    border-radius: 12px;
    font-size: 11px;
  }

  .iug-feedback-input {
    height: 40px;
    padding: 0 12px;
    border-radius: 11px;
    font-size: 11px;
  }

  .iug-feedback-bottom {
    padding-top: 16px;
  }

  .iug-feedback-entry-close {
    top: -2px;
    right: 8px;
    width: 20px;
    height: 20px;
    font-size: 15px;
    line-height: 17px;
  }
}

@media (max-width: 360px) {
  .iug-feedback-card {
    width: 90vw;
    height: 68vh;
    height: 68dvh;
    padding-left: 14px;
    padding-right: 14px;
  }

  .iug-feedback-textarea {
    height: 108px;
  }

  .iug-feedback-title {
    font-size: 15px;
  }

  .iug-feedback-entry-close {
    right: 6px;
  }
}
</style>

<script>
(function () {
  ensureIugViewportMeta();

  const FORMSPREE_ENDPOINT = "https://formspree.io/f/YOUR_FORM_ID";
  const IUG_VERSION = "2.3.1";
  const ENTRY_RESHOW_DELAY = 30000;

  const IUG_FEEDBACK_CONTENT = {
    satisfied: {
      icon: "./rate-satisfied.png",
      alt: "Satisfied",
      title: "Thanks for your feedback!",
      commentPlaceholder: "Any comments or suggestions?",
      contactPlaceholder: "Your Email",
      color: "#46ad52",
      contactNote: "",
      noteLeft: false,
      contactType: "email",
      contactInputMode: "email",
      contactAutocomplete: "email"
    },
    neutral: {
      icon: "./rate-neutral.png",
      alt: "Neutral",
      title: "Thanks for your feedback!",
      commentPlaceholder: "Any comments or suggestions?",
      contactPlaceholder: "Your Email",
      color: "#f3c433",
      contactNote: "",
      noteLeft: false,
      contactType: "email",
      contactInputMode: "email",
      contactAutocomplete: "email"
    },
    unsatisfied: {
      icon: "./rate-unsatisfied.png",
      alt: "Unsatisfied",
      title: "Sorry this wasn't helpful.",
      commentPlaceholder: "Tell us what happened",
      contactPlaceholder: "Your Email or Phone Number",
      color: "#df4747",
      contactNote: "So we can help you within 24h.",
      noteLeft: true,
      contactType: "text",
      contactInputMode: "text",
      contactAutocomplete: "off"
    }
  };

  let selectedIugFeedback = null;
  let lastFocusedElement = null;
  let toastTimer = null;
  let entryTimer = null;

  const entry = document.getElementById("iugFeedbackEntry");
  const entryClose = document.getElementById("iugFeedbackEntryClose");
  const modal = document.getElementById("iugFeedbackModal");
  if (!modal) return;

  const card = modal.querySelector(".iug-feedback-card");
  const icon = document.getElementById("iugFeedbackIcon");
  const title = document.getElementById("iugFeedbackTitle");
  const comment = document.getElementById("iugFeedbackComment");
  const contact = document.getElementById("iugFeedbackContact");
  const contactNote = document.getElementById("iugFeedbackContactNote");
  const note = document.getElementById("iugFeedbackNote");
  const doneButton = document.getElementById("iugFeedbackDone");
  const toast = document.getElementById("iugFeedbackToast");

  const feedbackButtons = document.querySelectorAll(".iug-feedback-emoji");

  feedbackButtons.forEach((button) => {
    button.addEventListener("click", () => {
      showFeedbackEntry();

      selectedIugFeedback = button.dataset.feedback;
      lastFocusedElement = button;

      feedbackButtons.forEach((btn) => btn.classList.remove("is-selected"));
      button.classList.add("is-selected");

      openIugFeedbackModal(selectedIugFeedback);
    });
  });

  if (entryClose) {
    entryClose.addEventListener("click", (event) => {
      event.stopPropagation();
      hideFeedbackEntryTemporarily();
    });
  }

  document.addEventListener("keydown", (event) => {
    if (!modal.classList.contains("is-open")) return;

    if (event.key === "Tab") {
      trapFocusInsideModal(event);
    }
  });

  doneButton.addEventListener("click", handleIugFeedbackSubmit);

  function hideFeedbackEntryTemporarily() {
    if (!entry || modal.classList.contains("is-open")) return;

    entry.classList.add("is-hidden");
    entry.setAttribute("aria-hidden", "true");

    feedbackButtons.forEach((btn) => btn.classList.remove("is-selected"));

    if (entryTimer) {
      clearTimeout(entryTimer);
    }

    entryTimer = setTimeout(() => {
      showFeedbackEntry();
    }, ENTRY_RESHOW_DELAY);
  }

  function showFeedbackEntry() {
    if (!entry) return;

    if (entryTimer) {
      clearTimeout(entryTimer);
      entryTimer = null;
    }

    entry.classList.remove("is-hidden");
    entry.setAttribute("aria-hidden", "false");
  }

  function openIugFeedbackModal(type) {
    const config = IUG_FEEDBACK_CONTENT[type];
    if (!config) return;

    icon.src = config.icon;
    icon.alt = config.alt;
    title.textContent = config.title;

    comment.value = "";
    contact.value = "";
    comment.placeholder = config.commentPlaceholder;
    contact.placeholder = config.contactPlaceholder;

    contact.type = config.contactType;
    contact.setAttribute("inputmode", config.contactInputMode);
    contact.setAttribute("autocomplete", config.contactAutocomplete);

    card.style.setProperty("--iug-feedback-color", config.color);

    contactNote.textContent = config.contactNote;
    contactNote.hidden = !config.contactNote;

    note.textContent = "Every comment is read by our team and helps us improve.";
    note.classList.toggle("is-left", config.noteLeft);

    doneButton.classList.remove("is-loading");
    doneButton.textContent = "Done";

    modal.classList.add("is-open");
    modal.setAttribute("aria-hidden", "false");

    window.setTimeout(() => {
      if (window.matchMedia("(min-width: 768px)").matches) {
        comment.focus();
      } else {
        doneButton.focus();
      }
    }, 0);
  }

  function closeIugFeedbackModal() {
    modal.classList.remove("is-open");
    modal.setAttribute("aria-hidden", "true");

    feedbackButtons.forEach((btn) => btn.classList.remove("is-selected"));

    doneButton.classList.remove("is-loading");
    doneButton.textContent = "Done";

    if (lastFocusedElement) {
      lastFocusedElement.focus();
    }
  }

  async function handleIugFeedbackSubmit() {
    if (!selectedIugFeedback) return;
    if (doneButton.classList.contains("is-loading")) return;

    doneButton.classList.add("is-loading");
    doneButton.textContent = "Saving...";

    const payload = buildIugFeedbackPayload();
    const success = await submitIugFeedback(payload);

    doneButton.classList.remove("is-loading");
    doneButton.textContent = "Done";

    if (success) {
      closeIugFeedbackModal();
      showIugFeedbackToast("Thanks, your feedback was saved.");
    } else {
      showIugFeedbackToast("Feedback could not be saved. Please try again.");
    }
  }

  function buildIugFeedbackPayload() {
    const urlParams = new URLSearchParams(window.location.search);

    return {
      rating: selectedIugFeedback,
      comment: comment.value.trim(),
      contact: contact.value.trim(),
      page_url: window.location.href,
      page_title: document.title,
      page_path: window.location.pathname,
      product: urlParams.get("product") || "",
      language: document.documentElement.lang || "",
      iug_version: IUG_VERSION,
      submitted_at: new Date().toISOString(),
      user_agent: navigator.userAgent
    };
  }

  async function submitIugFeedback(payload) {
    if (FORMSPREE_ENDPOINT.includes("YOUR_FORM_ID")) {
      console.warn("Replace FORMSPREE_ENDPOINT with your real Formspree endpoint before publishing.");
      console.log("IUG feedback payload:", payload);
      return true;
    }

    try {
      const response = await fetch(FORMSPREE_ENDPOINT, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Accept: "application/json"
        },
        body: JSON.stringify(payload)
      });

      return response.ok;
    } catch (error) {
      console.error("IUG feedback submission failed:", error);
      return false;
    }
  }

  function showIugFeedbackToast(message) {
    if (!toast) return;

    toast.textContent = message;
    toast.classList.add("is-visible");

    if (toastTimer) {
      clearTimeout(toastTimer);
    }

    toastTimer = setTimeout(() => {
      toast.classList.remove("is-visible");
    }, 2600);
  }

  function trapFocusInsideModal(event) {
    const focusableElements = card.querySelectorAll(
      'button, textarea, input, select, a[href], [tabindex]:not([tabindex="-1"])'
    );

    if (!focusableElements.length) return;

    const firstElement = focusableElements[0];
    const lastElement = focusableElements[focusableElements.length - 1];

    if (event.shiftKey && document.activeElement === firstElement) {
      event.preventDefault();
      lastElement.focus();
    }

    if (!event.shiftKey && document.activeElement === lastElement) {
      event.preventDefault();
      firstElement.focus();
    }
  }

  function ensureIugViewportMeta() {
    let viewport = document.querySelector('meta[name="viewport"]');

    if (!viewport) {
      viewport = document.createElement("meta");
      viewport.name = "viewport";
      document.head.appendChild(viewport);
    }

    viewport.setAttribute("content", "width=device-width, initial-scale=1, viewport-fit=cover");
  }
})();
</script>
