<!-- IUG Feedback Entry + Modals -->
<div class="iug-feedback-bar" aria-label="IUG feedback">
  <button class="iug-feedback-emoji" type="button" aria-label="Satisfied" data-feedback="satisfied">
    <span class="iug-emoji-face iug-face-satisfied">😊</span>
  </button>
  <button class="iug-feedback-emoji" type="button" aria-label="Neutral" data-feedback="neutral">
    <span class="iug-emoji-face iug-face-neutral">😐</span>
  </button>
  <button class="iug-feedback-emoji" type="button" aria-label="Unsatisfied" data-feedback="unsatisfied">
    <span class="iug-emoji-face iug-face-unsatisfied">☹️</span>
  </button>
</div>

<!-- Modal Template -->
<div class="iug-feedback-modal" id="iugModal" aria-hidden="true">
  <div class="iug-feedback-overlay" data-close-modal></div>
  <div class="iug-feedback-content">
    <div class="iug-feedback-emoji-large" id="modalEmoji">😊</div>
    <h2 id="modalTitle">Thanks for your feedback!</h2>
    <p id="modalSubtitle">Glad this helped!</p>
    <p class="iug-optional-text">Both fields are optional.</p>

    <textarea id="modalComment" placeholder="Any comments or suggestions?"></textarea>
    <input type="text" id="modalEmail" placeholder="Your Email" />

    <p class="iug-note-text" id="modalNote">
      Every comment is read by our team and helps us improve.
    </p>

    <button id="modalDone">Done</button>
  </div>
</div>

<style>
/* Feedback Bar */
.iug-feedback-bar {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 25px; /* increased spacing for larger emojis */
  z-index: 1000;
}

.iug-feedback-emoji {
  border: none;
  background: none;
  font-size: 2rem; /* doubled emoji size */
  cursor: pointer;
}

/* Modal Styles */
.iug-feedback-modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  max-width: 400px;
  height: 70vh; /* height stays same as design requirement */
  display: none;
  z-index: 1100;
}

.iug-feedback-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

.iug-feedback-content {
  position: relative;
  background: #fff;
  border-radius: 8px;
  padding: 25px 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between; /* evenly distribute content */
  height: 100%;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

.iug-feedback-emoji-large {
  font-size: 3rem;
  text-align: center;
  margin-bottom: 10px;
}

h2 {
  text-align: center;
  margin: 0;
  font-size: 1.25rem;
}

p {
  text-align: center;
  margin: 5px 0;
}

.iug-optional-text {
  font-size: 0.85rem;
  font-style: italic;
}

textarea, input[type="text"] {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  font-size: 0.95rem;
  border-radius: 4px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

.iug-note-text {
  font-size: 0.85rem;
  text-align: center;
  margin-top: 10px;
}

#modalDone {
  margin-top: 15px;
  padding: 10px;
  background: black;
  color: white;
  font-weight: bold;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
</style>

<script>
const feedbackBar = document.querySelectorAll('.iug-feedback-emoji');
const modal = document.getElementById('iugModal');
const modalEmoji = document.getElementById('modalEmoji');
const modalTitle = document.getElementById('modalTitle');
const modalSubtitle = document.getElementById('modalSubtitle');
const modalComment = document.getElementById('modalComment');
const modalEmail = document.getElementById('modalEmail');
const modalNote = document.getElementById('modalNote');
const modalDone = document.getElementById('modalDone');
const overlay = document.querySelector('.iug-feedback-overlay');

let selectedFeedback = '';

feedbackBar.forEach(btn => {
  btn.addEventListener('click', () => {
    selectedFeedback = btn.dataset.feedback;

    // Set modal content based on feedback
    if(selectedFeedback === 'satisfied') {
      modalEmoji.textContent = '😊';
      modalTitle.textContent = 'Thanks for your feedback!';
      modalSubtitle.textContent = 'Glad this helped!';
      modalComment.placeholder = 'Any comments or suggestions?';
      modalEmail.placeholder = 'Your Email';
    } else if(selectedFeedback === 'neutral') {
      modalEmoji.textContent = '😐';
      modalTitle.textContent = 'Thanks for your feedback!';
      modalSubtitle.textContent = 'What could be better?';
      modalComment.placeholder = 'Any comments or suggestions?';
      modalEmail.placeholder = 'Your Email';
    } else {
      modalEmoji.textContent = '☹️';
      modalTitle.textContent = "Sorry this wasn't helpful.";
      modalSubtitle.textContent = 'What went wrong?';
      modalComment.placeholder = 'Tell us what happened';
      modalEmail.placeholder = 'Your Email or Phone Number';
      modalNote.textContent = 'So we can help you within 24h.\nEvery comment is read by our team and helps us improve.';
    }

    modal.style.display = 'flex';
    modal.setAttribute('aria-hidden', 'false');
  });
});

overlay.addEventListener('click', closeModal);
modalDone.addEventListener('click', closeModal);

function closeModal() {
  modal.style.display = 'none';
  modal.setAttribute('aria-hidden', 'true');
  modalComment.value = '';
  modalEmail.value = '';
}
</script>
