<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IUG Feedback Test</title>
<style>
/* 底部表情入口 */
.iug-feedback-bar {
  position: fixed; left:50%; bottom:18px; transform:translateX(-50%);
  display:flex; gap:42px; pointer-events:none; z-index:9998;
}
.iug-feedback-emoji { pointer-events:auto; border:none; background:transparent;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  cursor:pointer; transition: transform 0.15s ease; border-radius:50%; padding:0;}
.iug-feedback-emoji:hover {transform:scale(1.12);}
.iug-feedback-emoji:active {transform:scale(0.96);}
.iug-feedback-emoji.is-selected {transform:scale(1.16); filter:drop-shadow(0 4px 8px rgba(0,0,0,0.22));}
.iug-emoji-img {width:32px;height:32px;object-fit:contain;}

/* 弹窗样式 */
.iug-feedback-modal {position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:10000; padding:18px;}
.iug-feedback-modal.is-open {display:flex;}
.iug-feedback-overlay {position:absolute; inset:0; background:rgba(0,0,0,0.35);}
.iug-feedback-card {position:relative; z-index:1; max-width:360px; width:100%;
  background:#f7f7f7; border-radius:6px; padding:28px 36px 30px;
  display:flex; flex-direction:column; align-items:center; font-family:inherit; color:#111;}
.iug-feedback-icon {width:72px; height:72px; display:flex; align-items:center; justify-content:center; margin-bottom:20px;}
.iug-modal-emoji-img {width:72px; height:72px; object-fit:contain; display:block;}
.iug-feedback-title {margin:0; font-size:20px; line-height:1.2; font-weight:800; text-align:center;}
.iug-feedback-subtitle {margin:8px 0 34px; font-size:14px; font-weight:700; text-align:center;}
.iug-feedback-optional {width:100%; margin-bottom:18px; font-size:13px; font-style:italic; font-weight:400; color:#777; text-align:left;}
.iug-feedback-textarea, .iug-feedback-input {width:100%; border:1px solid #c9c9c9; border-radius:6px;
  background:transparent; padding:11px 8px; font-family:inherit; font-weight:400; font-size:13px; color:#111; outline:none; box-sizing:border-box;}
.iug-feedback-textarea {height:126px; resize:none;}
.iug-feedback-input {height:40px; margin-top:20px;}
.iug-feedback-textarea::placeholder, .iug-feedback-input::placeholder {font-family:inherit; font-weight:400; color:#777; opacity:1;}
.iug-feedback-contact-note {width:100%; margin:8px 0 28px; font-size:12px; font-style:italic; font-weight:400; color:#777; text-align:left;}
.iug-feedback-note {width:100%; margin:36px 0 24px; font-size:13px; color:#666; text-align:left;}
.iug-feedback-done {width:100%; height:38px; border:none; border-radius:999px; background:#000; color:#fff; font-size:15px; font-weight:800; cursor:pointer;}
.iug-feedback-done:active {transform:scale(0.98);}
</style>
</head>
<body>

<!-- 底部表情入口 -->
<div class="iug-feedback-bar">
  <button class="iug-feedback-emoji" data-feedback="satisfied"><img class="iug-emoji-img" src="./rate-satisfied.png" alt="Satisfied"></button>
  <button class="iug-feedback-emoji" data-feedback="neutral"><img class="iug-emoji-img" src="./rate-neutral.png" alt="Neutral"></button>
  <button class="iug-feedback-emoji" data-feedback="unsatisfied"><img class="iug-emoji-img" src="./rate-unsatisfied.png" alt="Unsatisfied"></button>
</div>

<!-- 模板示例：Unsatisfied Modal -->
<div class="iug-feedback-modal" id="iugUnsatisfiedModal" aria-hidden="true">
  <div class="iug-feedback-overlay" data-close-modal></div>
  <div class="iug-feedback-card">
    <div class="iug-feedback-icon"><img src="./rate-unsatisfied.png" class="iug-modal-emoji-img"></div>
    <h2 class="iug-feedback-title">Sorry this wasn't helpful.</h2>
    <p class="iug-feedback-subtitle">What went wrong?</p>
    <p class="iug-feedback-optional">Both fields are optional.</p>
    <textarea id="unsatisfiedComment" class="iug-feedback-textarea" placeholder="Tell us what happened"></textarea>
    <input id="unsatisfiedContact" class="iug-feedback-input" type="text" placeholder="Your Email or Phone Number">
    <p class="iug-feedback-contact-note">So we can help you within 24h.</p>
    <p class="iug-feedback-note">Every comment is read by our team and helps us improve.</p>
    <button class="iug-feedback-done" data-submit-feedback="unsatisfied">Done</button>
  </div>
</div>

<script>
const FORMSPREE_ENDPOINT = "https://formspree.io/f/YOUR_FORM_ID";
const IUG_FEEDBACK_CONFIG = {
  satisfied: { modalId:"iugSatisfiedModal", commentId:"satisfiedComment", contactId:"satisfiedContact"},
  neutral: { modalId:"iugNeutralModal", commentId:"neutralComment", contactId:"neutralContact"},
  unsatisfied: { modalId:"iugUnsatisfiedModal", commentId:"unsatisfiedComment", contactId:"unsatisfiedContact"}
};

document.querySelectorAll(".iug-feedback-emoji").forEach(btn=>{
  btn.addEventListener("click",()=>{
    const type=btn.dataset.feedback;
    document.querySelectorAll(".iug-feedback-emoji").forEach(b=>b.classList.remove("is-selected"));
    btn.classList.add("is-selected");
    openIugFeedbackModal(type);
  });
});

document.querySelectorAll("[data-close-modal]").forEach(overlay=>{
  overlay.addEventListener("click",()=>closeAllIugFeedbackModals());
});
document.querySelectorAll("[data-submit-feedback]").forEach(btn=>{
  btn.addEventListener("click",()=>handleIugFeedbackSubmit(btn.dataset.submitFeedback,btn));
});
document.addEventListener("keydown", e=>{if(e.key==="Escape") closeAllIugFeedbackModals();});

function openIugFeedbackModal(type){
  closeAllIugFeedbackModals();
  const cfg=IUG_FEEDBACK_CONFIG[type];
  if(!cfg) return;
  const modal=document.getElementById(cfg.modalId);
  modal.classList.add("is-open");
  modal.setAttribute("aria-hidden","false");
}
function closeAllIugFeedbackModals(){
  document.querySelectorAll(".iug-feedback-modal").forEach(modal=>{
    modal.classList.remove("is-open");
    modal.setAttribute("aria-hidden","true");
  });
}

async function handleIugFeedbackSubmit(type, btn){
  const cfg=IUG_FEEDBACK_CONFIG[type];
  if(!cfg) return;
  const comment=document.getElementById(cfg.commentId)?.value.trim()||"";
  const contact=document.getElementById(cfg.contactId)?.value.trim()||"";
  btn.disabled=true; btn.textContent="Saving...";
  try{
    await fetch(FORMSPREE_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({rating:type,comment,contact})});
  }catch(e){console.error(e);}
  btn.disabled=false; btn.textContent="Done";
  closeAllIugFeedbackModals();
}
</script>
