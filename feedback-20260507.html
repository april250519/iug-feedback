<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IUG Feedback Demo</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #f3f3f3;
      padding-bottom: 130px;
    }

    /* Demo page only */
    .iug-demo-page {
      width: min(430px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 8px 32px 120px;
      background: #f6f6f6;
    }

    .iug-demo-card {
      border: 2px solid #222;
      border-radius: 8px;
      padding: 0 46px 34px;
      text-align: center;
      background: #f8f8f8;
    }

    .iug-demo-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 2px auto 18px;
      padding: 12px 28px;
      border-radius: 0 0 8px 8px;
      background: #76c900;
      color: #fff;
      font-size: 28px;
      font-weight: 800;
    }

    .iug-demo-title {
      margin: 0 0 24px;
      font-size: 28px;
      line-height: 1.2;
      color: #111;
    }

    .iug-demo-subtitle {
      margin: 0 0 32px;
      font-size: 24px;
      line-height: 1.35;
      color: #555;
    }

    .iug-demo-product {
      width: 170px;
      height: 230px;
      margin: 0 auto 36px;
      border-radius: 24px;
      background: linear-gradient(145deg, #1d1d1d, #555);
      transform: rotate(-13deg);
      box-shadow: 0 16px 24px rgba(0, 0, 0, 0.24);
    }

    .iug-demo-guide-title {
      margin: 0 0 6px;
      font-size: 24px;
      font-weight: 800;
      color: #111;
    }

    .iug-demo-version {
      margin: 0 0 26px;
      font-size: 15px;
      color: #555;
    }

    .iug-demo-button {
      width: 100%;
      height: 56px;
      margin-top: 16px;
      border: none;
      border-radius: 999px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
    }

    .iug-demo-button.primary {
      background: #76c900;
      color: #fff;
    }

    .iug-demo-button.secondary {
      background: #dedede;
      color: #333;
      box-shadow: 0 4px 0 #aaa;
    }

    /* Feedback bar */
    .iug-feedback-bar {
      position: fixed;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom, 0px));
      z-index: 9998;
      width: min(80vw, 380px);
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }

    .iug-feedback-emoji {
      pointer-events: auto;
      width: 78px;
      height: 78px;
      border: none;
      border-radius: 50%;
      background: transparent;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    .iug-feedback-emoji:hover {
      transform: translateY(-2px);
    }

    .iug-feedback-emoji:active {
      transform: scale(0.94);
    }

    .iug-feedback-emoji.is-selected {
      transform: scale(1.06);
      filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.3));
    }

    .iug-emoji-img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      display: block;
    }

    /* Modal */
    .iug-feedback-modal {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .iug-feedback-modal.is-open {
      display: flex;
    }

    .iug-feedback-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(2px);
    }

    .iug-feedback-card {
      position: relative;
      z-index: 1;
      width: min(80vw, 430px);
      max-height: calc(100dvh - 40px);
      padding: 32px 34px 28px;
      border: 1.5px solid #777;
      border-radius: 10px;
      background: #000;
      color: #f5f5f5;
      overflow-y: auto;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
    }

    .iug-feedback-close {
      position: absolute;
      top: 14px;
      right: 16px;
      width: 34px;
      height: 34px;
      border: none;
      background: transparent;
      color: #888;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
    }

    .iug-feedback-close:hover {
      color: #fff;
    }

    .iug-feedback-top {
      text-align: center;
    }

    .iug-modal-emoji-img {
      display: block;
      width: 80px;
      height: 80px;
      margin: 0 auto 112px;
      object-fit: contain;
    }

    .iug-feedback-title {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    .iug-feedback-optional {
      margin: 0 0 22px;
      font-size: 16px;
      line-height: 1.4;
      font-style: italic;
      font-weight: 700;
      text-align: left;
      color: #8e8e8e;
    }

    .iug-feedback-textarea {
      width: 100%;
      height: 142px;
      resize: none;
      padding: 12px 14px;
      border: 1.5px solid #888;
      border-radius: 8px;
      background: #000;
      color: #f5f5f5;
      font-size: 16px;
      line-height: 1.45;
      font-weight: 600;
      outline: none;
    }

    .iug-feedback-input {
      width: 100%;
      height: 52px;
      margin-top: 24px;
      padding: 0 14px;
      border: 1.5px solid #888;
      border-radius: 8px;
      background: #000;
      color: #f5f5f5;
      font-size: 16px;
      line-height: 1;
      font-weight: 600;
      outline: none;
    }

    .iug-feedback-textarea::placeholder,
    .iug-feedback-input::placeholder {
      color: #8e8e8e;
      opacity: 1;
    }

    .iug-feedback-textarea:focus,
    .iug-feedback-input:focus {
      border-color: var(--iug-feedback-color, #46ad52);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--iug-feedback-color, #46ad52) 35%, transparent);
    }

    .iug-feedback-contact-note {
      margin: 10px 0 0;
      font-size: 13px;
      line-height: 1.45;
      font-style: italic;
      font-weight: 700;
      text-align: left;
      color: #8e8e8e;
    }

    .iug-feedback-note {
      margin: 30px 0 28px;
      font-size: 15px;
      line-height: 1.55;
      font-weight: 700;
      text-align: left;
      color: #8e8e8e;
    }

    .iug-feedback-note.is-center {
      text-align: center;
    }

    .iug-feedback-done {
      display: block;
      width: 100%;
      height: 46px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .iug-feedback-done:hover {
      opacity: 0.84;
    }

    .iug-feedback-done:active {
      transform: scale(0.98);
    }

    .iug-feedback-done.is-loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .iug-feedback-toast {
      position: fixed;
      left: 50%;
      bottom: calc(112px + env(safe-area-inset-bottom, 0px));
      z-index: 10001;
      max-width: min(86vw, 420px);
      padding: 12px 18px;
      border-radius: 999px;
      background: #111;
      color: #fff;
      font-size: 14px;
      line-height: 1.4;
      font-weight: 700;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(8px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
    }

    .iug-feedback-toast.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 430px) {
      .iug-demo-page {
        padding-left: 32px;
        padding-right: 32px;
      }

      .iug-feedback-card {
        width: min(86vw, 380px);
        padding: 30px 24px 24px;
      }

      .iug-modal-emoji-img {
        width: 64px;
        height: 64px;
        margin-bottom: 112px;
      }

      .iug-feedback-optional {
        font-size: 14px;
      }

      .iug-feedback-textarea {
        height: 142px;
        font-size: 14px;
      }

      .iug-feedback-input {
        height: 50px;
        font-size: 14px;
      }

      .iug-feedback-note {
        font-size: 13px;
      }

      .iug-feedback-done {
        font-size: 20px;
      }

      .iug-feedback-emoji {
        width: 70px;
        height: 70px;
      }

      .iug-emoji-img {
        width: 52px;
        height: 52px;
      }
    }

    @media (max-height: 760px) {
      .iug-feedback-card {
        padding-top: 24px;
        padding-bottom: 20px;
      }

      .iug-modal-emoji-img {
        width: 56px;
        height: 56px;
        margin-bottom: 80px;
      }

      .iug-feedback-optional {
        margin-bottom: 16px;
        font-size: 13px;
      }

      .iug-feedback-textarea {
        height: 120px;
      }

      .iug-feedback-input {
        height: 46px;
        margin-top: 18px;
      }

      .iug-feedback-note {
        margin: 20px 0 18px;
        font-size: 12px;
      }

      .iug-feedback-done {
        height: 40px;
        font-size: 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .iug-feedback-emoji,
      .iug-feedback-done,
      .iug-feedback-toast {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <!-- Demo IUG page content. Replace this section with your real IUG content. -->
  <main class="iug-demo-page">
    <section class="iug-demo-card">
      <div class="iug-demo-logo">Avantree</div>

      <h1 class="iug-demo-title">Relay</h1>

      <p class="iug-demo-subtitle">
        Airplane Bluetooth<br />
        Transmitter
      </p>

      <div class="iug-demo-product" aria-hidden="true"></div>

      <p class="iug-demo-guide-title">Interactive User Guide</p>
      <p class="iug-demo-version">Version 2.3.1</p>

      <button class="iug-demo-button primary" type="button">▶ First Time Setup</button>
      <button class="iug-demo-button secondary" type="button">⚙ Troubleshooting</button>
    </section>
  </main>

  <!-- IUG Feedback Entry -->
  <div class="iug-feedback-bar" aria-label="IUG feedback">
    <button class="iug-feedback-emoji" type="button" aria-label="Satisfied" data-feedback="satisfied">
      <img class="iug-emoji-img" src="./rate-satisfied.png" alt="" />
    </button>

    <button class="iug-feedback-emoji" type="button" aria-label="Neutral" data-feedback="neutral">
      <img class="iug-emoji-img" src="./rate-neutral.png" alt="" />
    </button>

    <button class="iug-feedback-emoji" type="button" aria-label="Unsatisfied" data-feedback="unsatisfied">
      <img class="iug-emoji-img" src="./rate-unsatisfied.png" alt="" />
    </button>
  </div>

  <!-- Feedback Modal -->
  <div class="iug-feedback-modal" id="iugFeedbackModal" aria-hidden="true">
    <div class="iug-feedback-overlay" data-close-modal></div>

    <div
      class="iug-feedback-card"
      role="dialog"
      aria-modal="true"
      aria-labelledby="iugFeedbackTitle"
    >
      <button class="iug-feedback-close" type="button" aria-label="Close" data-close-modal>×</button>

      <div class="iug-feedback-top">
        <img id="iugFeedbackIcon" class="iug-modal-emoji-img" src="./rate-satisfied.png" alt="" />
        <h2 id="iugFeedbackTitle" class="iug-feedback-title">Thanks for your feedback!</h2>
        <p class="iug-feedback-optional">Both fields are optional.</p>
      </div>

      <div class="iug-feedback-middle">
        <textarea
          id="iugFeedbackComment"
          class="iug-feedback-textarea"
          placeholder="Any comments or suggestions?"
        ></textarea>

        <input
          id="iugFeedbackContact"
          class="iug-feedback-input"
          type="text"
          autocomplete="email"
          placeholder="Your Email"
        />

        <p id="iugFeedbackContactNote" class="iug-feedback-contact-note" hidden></p>
      </div>

      <div class="iug-feedback-bottom">
        <p id="iugFeedbackNote" class="iug-feedback-note">
          Every comment is read by our team and helps us improve.
        </p>

        <button id="iugFeedbackDone" class="iug-feedback-done" type="button">
          Done
        </button>
      </div>
    </div>
  </div>

  <div id="iugFeedbackToast" class="iug-feedback-toast" role="status" aria-live="polite"></div>

  <script>
    const FORMSPREE_ENDPOINT = "https://formspree.io/f/YOUR_FORM_ID";
    const IUG_VERSION = "2.3.1";

    const IUG_FEEDBACK_CONTENT = {
      satisfied: {
        icon: "./rate-satisfied.png",
        alt: "Satisfied",
        title: "Thanks for your feedback!",
        commentPlaceholder: "Any comments or suggestions?",
        contactPlaceholder: "Your Email",
        contactAutocomplete: "email",
        color: "#46ad52",
        contactNote: "",
        note: "Every comment is read by our team and helps us improve.",
        noteCenter: true,
      },

      neutral: {
        icon: "./rate-neutral.png",
        alt: "Neutral",
        title: "Thanks for your feedback!",
        commentPlaceholder: "Any comments or suggestions?",
        contactPlaceholder: "Your Email",
        contactAutocomplete: "email",
        color: "#f3c433",
        contactNote: "",
        note: "Every comment is read by our team and helps us improve.",
        noteCenter: true,
      },

      unsatisfied: {
        icon: "./rate-unsatisfied.png",
        alt: "Unsatisfied",
        title: "Sorry this wasn't helpful.",
        commentPlaceholder: "Tell us what happened",
        contactPlaceholder: "Your Email or Phone Number",
        contactAutocomplete: "email",
        color: "#df4747",
        contactNote: "Optional — leave a contact if you'd like us to follow up within 24 hours.",
        note: "Every comment is read by our team and helps us improve.",
        noteCenter: false,
      },
    };

    let selectedIugFeedback = null;
    let lastFocusedElement = null;
    let toastTimer = null;

    const modal = document.getElementById("iugFeedbackModal");
    const card = modal.querySelector(".iug-feedback-card");

    const icon = document.getElementById("iugFeedbackIcon");
    const title = document.getElementById("iugFeedbackTitle");

    const comment = document.getElementById("iugFeedbackComment");
    const contact = document.getElementById("iugFeedbackContact");

    const contactNote = document.getElementById("iugFeedbackContactNote");
    const note = document.getElementById("iugFeedbackNote");

    const doneButton = document.getElementById("iugFeedbackDone");
    const toast = document.getElementById("iugFeedbackToast");

    const feedbackButtons = document.querySelectorAll(".iug-feedback-emoji");
    const closeButtons = document.querySelectorAll("[data-close-modal]");

    feedbackButtons.forEach((button) => {
      button.addEventListener("click", () => {
        selectedIugFeedback = button.dataset.feedback;
        lastFocusedElement = button;

        feedbackButtons.forEach((btn) => {
          btn.classList.remove("is-selected");
        });

        button.classList.add("is-selected");
        openIugFeedbackModal(selectedIugFeedback);
      });
    });

    closeButtons.forEach((element) => {
      element.addEventListener("click", closeIugFeedbackModal);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modal.classList.contains("is-open")) {
        closeIugFeedbackModal();
      }

      if (event.key === "Tab" && modal.classList.contains("is-open")) {
        trapFocusInsideModal(event);
      }
    });

    doneButton.addEventListener("click", handleIugFeedbackSubmit);

    function openIugFeedbackModal(type) {
      const config = IUG_FEEDBACK_CONTENT[type];

      if (!config) return;

      icon.src = config.icon;
      icon.alt = config.alt;

      title.textContent = config.title;

      comment.value = "";
      contact.value = "";

      comment.placeholder = config.commentPlaceholder;
      contact.placeholder = config.contactPlaceholder;
      contact.setAttribute("autocomplete", config.contactAutocomplete);

      card.style.setProperty("--iug-feedback-color", config.color);

      contactNote.textContent = config.contactNote;
      contactNote.hidden = !config.contactNote;

      note.textContent = config.note;
      note.classList.toggle("is-center", config.noteCenter);

      doneButton.classList.remove("is-loading");
      doneButton.textContent = "Done";

      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");

      setTimeout(() => {
        comment.focus();
      }, 0);
    }

    function closeIugFeedbackModal() {
      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");

      feedbackButtons.forEach((btn) => {
        btn.classList.remove("is-selected");
      });

      doneButton.classList.remove("is-loading");
      doneButton.textContent = "Done";

      if (lastFocusedElement) {
        lastFocusedElement.focus();
      }
    }

    async function handleIugFeedbackSubmit() {
      if (!selectedIugFeedback) return;

      doneButton.classList.add("is-loading");
      doneButton.textContent = "Saving...";

      const payload = buildIugFeedbackPayload();

      const success = await submitIugFeedback(payload);

      doneButton.classList.remove("is-loading");
      doneButton.textContent = "Done";

      if (success) {
        closeIugFeedbackModal();
        showIugFeedbackToast("Thanks, your feedback was saved.");
      } else {
        showIugFeedbackToast("Feedback could not be saved. Please try again.");
      }
    }

    function buildIugFeedbackPayload() {
      const urlParams = new URLSearchParams(window.location.search);

      return {
        rating: selectedIugFeedback,
        comment: comment.value.trim(),
        contact: contact.value.trim(),

        page_url: window.location.href,
        page_title: document.title,
        page_path: window.location.pathname,

        product: urlParams.get("product") || "",
        language: document.documentElement.lang || "",
        iug_version: IUG_VERSION,

        submitted_at: new Date().toISOString(),
        user_agent: navigator.userAgent,
      };
    }

    async function submitIugFeedback(payload) {
      if (FORMSPREE_ENDPOINT.includes("YOUR_FORM_ID")) {
        console.warn("Replace FORMSPREE_ENDPOINT with your real Formspree endpoint before publishing.");
        return true;
      }

      try {
        const response = await fetch(FORMSPREE_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Accept: "application/json",
          },
          body: JSON.stringify(payload),
        });

        return response.ok;
      } catch (error) {
        console.error("IUG feedback submission failed:", error);
        return false;
      }
    }

    function showIugFeedbackToast(message) {
      toast.textContent = message;
      toast.classList.add("is-visible");

      if (toastTimer) {
        clearTimeout(toastTimer);
      }

      toastTimer = setTimeout(() => {
        toast.classList.remove("is-visible");
      }, 2600);
    }

    function trapFocusInsideModal(event) {
      const focusableElements = card.querySelectorAll(
        'button, textarea, input, select, a[href], [tabindex]:not([tabindex="-1"])'
      );

      if (!focusableElements.length) return;

      const firstElement = focusableElements[0];
      const lastElement = focusableElements[focusableElements.length - 1];

      if (event.shiftKey && document.activeElement === firstElement) {
        event.preventDefault();
        lastElement.focus();
      }

      if (!event.shiftKey && document.activeElement === lastElement) {
        event.preventDefault();
        firstElement.focus();
      }
    }
  </script>
</body>
</html>
