<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guide Feedback</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #f7f5f7;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px;
      box-sizing: border-box;
    }

    .wrap {
      width: 100%;
      max-width: 520px;
    }

    .submit-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      background: #95c11f;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      padding: 16px;
      cursor: pointer;
      letter-spacing: 0.3px;
      box-shadow: 0 6px 18px rgba(149,193,31,0.2);
      transition: all 0.2s ease;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .optional-block {
      margin-top: 20px;
      background: #f1eef3;
      border: 1px solid #e6e1e9;
      border-radius: 18px;
      padding: 18px 14px;
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
      font-size: 16px;
      font-weight: 500;
      color: #2a2a2a;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      border-top: 3px dotted #333;
      opacity: 0.7;
    }

    textarea,
    input[type="email"] {
      width: 100%;
      border: 1px solid #ddd6e1;
      border-radius: 14px;
      background: #faf8fb;
      font-size: 14px;
      font-family: "Inter", sans-serif;
      padding: 14px 16px;
      outline: none;
      box-sizing: border-box;
    }

    textarea {
      min-height: 160px;
      margin-bottom: 12px;
      resize: vertical;
    }

    input[type="email"] {
      height: 42px;
      margin-bottom: 10px;
    }

    textarea:focus,
    input:focus {
      background: #fff;
      border-color: #cfc7d6;
    }

    textarea::placeholder,
    input::placeholder {
      color: #9a95a0;
    }

    .helper {
      font-size: 13px;
      color: #8d8891;
      font-style: italic;
      margin: 0;
    }

    .form-view.hidden {
      display: none;
    }

    .thank-you {
      display: none;
      min-height: 60vh;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 16px;
    }

    .thank-you.active {
      display: flex;
    }

    .thank-you h2 {
      margin: 0 0 12px;
      font-size: 24px;
      font-weight: 600;
    }

    .thank-you p {
      margin: 0;
      font-size: 15px;
      color: #666;
      max-width: 320px;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="form-view" id="formView">
      <form id="feedbackForm">
        <input type="hidden" name="rating" id="ratingInput">
        <input type="hidden" name="product_id" id="productIdInput">
        <input type="hidden" name="form_version" value="new">

        <button type="submit" class="submit-btn" id="submitBtn">
          Send now
        </button>

        <div class="optional-block">
          <div class="divider">Add a comment (Optional)</div>

          <textarea name="message" placeholder="Tell us more..."></textarea>

          <input type="email" name="email" placeholder="Email...">

          <p class="helper">
            Your comment will be included when you send.
          </p>
        </div>
      </form>
    </div>

    <div class="thank-you" id="thankYouView">
      <h2>Thanks for your feedback!</h2>
      <p>Your feedback helps us improve this guide for everyone.</p>
    </div>

  </div>

  <script>
    const FORM_ENDPOINT = "https://formspree.io/f/xykzqgbg";

    const params = new URLSearchParams(window.location.search);
    const returnUrl = params.get("return_url");

    const ratingInput = document.getElementById("ratingInput");
    const productIdInput = document.getElementById("productIdInput");

    const form = document.getElementById("feedbackForm");
    const submitBtn = document.getElementById("submitBtn");

    const formView = document.getElementById("formView");
    const thankYouView = document.getElementById("thankYouView");

    ratingInput.value = params.get("rating") || "unknown";
    productIdInput.value = params.get("product_id") || "unknown";

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;

      try {
        const data = new FormData(form);

        const res = await fetch(FORM_ENDPOINT, {
          method: "POST",
          body: data,
          headers: { "Accept": "application/json" }
        });

        if (!res.ok) throw new Error();

        formView.classList.add("hidden");
        thankYouView.classList.add("active");

        setTimeout(() => {
          window.location.href = returnUrl || document.referrer || "/";
        }, 1200);

      } catch {
        alert("Something went wrong. Please try again.");
        submitBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
