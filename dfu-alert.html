<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firmware Update Alerts</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #111827;
      background:
        radial-gradient(circle at top right, rgba(125, 180, 45, 0.12), transparent 35%),
        linear-gradient(180deg, #ffffff 0%, #ffffff 70%, #f3faea 100%);
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 80px;
      text-align: center;
      position: relative;
    }

    .content {
      width: 100%;
      max-width: 760px;
      z-index: 2;
    }

    .icon {
      width: 82px;
      height: 82px;
      margin: 0 auto 28px;
      border-radius: 50%;
      background: rgba(92, 162, 15, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #5ca20f;
    }

    .icon svg {
      width: 54px;
      height: 54px;
    }

    h1 {
      font-size: 64px;
      line-height: 1.08;
      font-weight: 800;
      letter-spacing: -1.5px;
      margin-bottom: 24px;
    }

    h1 span {
      color: #5ca20f;
      display: block;
    }

    .subtitle {
      font-size: 22px;
      line-height: 1.6;
      color: #6b7280;
      margin-bottom: 52px;
    }

    form {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 120px;
    }

    .input-wrap {
      width: 520px;
      height: 68px;
      border: 1.5px solid #d1d5db;
      border-radius: 12px;
      background: #ffffff;
      display: flex;
      align-items: center;
      padding: 0 24px;
    }

    .input-wrap svg {
      width: 26px;
      height: 26px;
      color: #8b95a5;
      flex-shrink: 0;
    }

    input {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      padding-left: 20px;
      font-size: 20px;
      color: #111827;
      background: transparent;
    }

    input::placeholder {
      color: #7b8494;
    }

    button {
      height: 68px;
      padding: 0 38px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(180deg, #76b91f, #4f9704);
      color: #ffffff;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(92, 162, 15, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(92, 162, 15, 0.32);
    }

    .privacy {
      color: #6b7280;
      font-size: 17px;
      line-height: 1.6;
    }

    .privacy strong {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #111827;
      font-size: 18px;
      margin-bottom: 6px;
    }

    .privacy svg {
      width: 22px;
      height: 22px;
      color: #75b843;
    }

    .wave {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 220px;
      background:
        radial-gradient(ellipse at 25% 100%, rgba(166, 210, 101, 0.2), transparent 60%),
        radial-gradient(ellipse at 75% 100%, rgba(166, 210, 101, 0.16), transparent 60%);
      z-index: 1;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 44px;
      }

      .subtitle {
        font-size: 18px;
        margin-bottom: 36px;
      }

      form {
        flex-direction: column;
        align-items: center;
        margin-bottom: 90px;
      }

      .input-wrap,
      button {
        width: 100%;
        max-width: 520px;
      }

      button {
        padding: 0;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="content">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 6h16v12H4z" />
          <path d="m4 7 8 6 8-6" />
          <circle cx="19" cy="5" r="2.5" fill="currentColor" stroke="none" />
        </svg>
      </div>

      <h1>
        Get Firmware
        <span>Update Alerts</span>
      </h1>

      <p class="subtitle">
        Subscribe to receive the latest firmware updates<br />
        and important notifications.
      </p>

      <form action="https://formspree.io/f/YOUR_FORMSPREE_ENDPOINT" method="POST">
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="5" width="18" height="14" rx="2" />
            <path d="m3 7 9 6 9-6" />
          </svg>

          <input
            type="email"
            name="email"
            placeholder="Enter your email address"
            required
          />
        </div>

        <button type="submit">Notify Me</button>
      </form>

      <div class="privacy">
        <strong>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 3 5 6v5c0 5 3.5 8 7 10 3.5-2 7-5 7-10V6l-7-3z" />
            <path d="m9 12 2 2 4-5" />
          </svg>
          We respect your privacy.
        </strong>
        <br />
        Your email will only be used for firmware update notifications.
      </div>
    </section>

    <div class="wave"></div>
  </main>
</body>
</html>
